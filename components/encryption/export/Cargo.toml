[package]
name = "encryption_export"
version = "0.0.1"
edition = "2021"
publish = false
license = "Apache-2.0"

[features]
sm4 = ["encryption/sm4"]
# Forwards the FIPS feature down to gcp_v2 (which gates rustls/fips). gcp_v2 is
# only a transitive dependency of the binaries, so the feature must be forwarded
# through this chain rather than enabled directly as `gcp_v2/fips`.
fips = ["gcp_v2/fips"]

[dependencies]
aws = { workspace = true }
azure = { workspace = true }
cloud = { workspace = true }
encryption = { workspace = true }
file_system = { workspace = true }
gcp = { workspace = true }
gcp_v2 = { workspace = true }
kvproto = { workspace = true }
protobuf = { version = "2.8", features = ["bytes"] }
slog = { workspace = true }
# better to not use slog-global, but pass in the logger
slog-global = { workspace = true }
tikv_util = { workspace = true }

[dev-dependencies]
rust-ini = "0.14.0"
structopt = "0.3"
